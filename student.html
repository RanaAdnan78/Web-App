<!DOCTYPE html>
<html lang="en">
    <head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Shop Store</title>
        <link rel="stylesheet" href="sty.css">
    </head>
    <body>
        <header>
        <div class="logo">
            <span>🛒</span>
            <h1>Shop Store</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Cart</a></li>
            </ul>
        </header>
        <main>
            <section>
                <article class="product-card">
                    <img src="3.jpg" width="300" height="200" alt="Product 1">
                    <h3>Zero Gravity</h3>
                    <p>45+ Battery Timing Good Bass</p>
                    <p><span class="price">$99.99</span></p>
                    <span class="Ratting">⭐⭐⭐⭐⭐</span>
                    <button type="button">Add to Cart</button>
                </article>
                <article class="product-card">
                    <img src="4.jpg" width="300" height="200" alt="Product 2">
                    <h3>Noise Cancelling</h3>
                    <p>40+ All Time Best Buds</p>
                    <p><span class="price">$149.99</span></p>
                    <span class="Ratting">⭐⭐⭐⭐</span>
                    <button type="button">Add to Cart</button>
                </article>
                <article class="product-card">
                    <img src="5.jpg" width="300" height="200" alt="Product 3">
                    <h3>Wireless Earbuds</h3>
                    <p>30+ Battery Life Good Sound</p>
                    <p><span class="price">$79.99</span></p>
                    <span class="Ratting">⭐⭐⭐⭐⭐</span>
                    <button type="button">Add to Cart</button>
                </article>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Shop Store. All rights reserved.</p>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
